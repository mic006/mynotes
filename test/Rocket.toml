### MyNotes configuration ###

# Rocket web server config
[default]
port = 12345
workers = 2
ident = false

# MyNotes app config
[default.app]
# path to root directory containing content (markdown + static files)
content_path = "."
# path to the HTML template file, relative to `content_path`
template_path = "static/template.html"

[default.app.users]
# authorized users: user name and password mapping
user = "password"
